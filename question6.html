<!DOCTYPE html>
<html>
<body>
<script>

var a = parseInt(prompt("Enter a"));
var b = parseInt(prompt("Enter b"));
var c = parseInt(prompt("Enter c"));

var score = 3 * a + b - 2 * c;

if (score < 0) {
    score = 0;
}

if (a + b + c > 50) {
    score = score - 10;
}

if (score >= 60) {
    alert(score + ", PASS");
} else {
    alert(score + ", FAIL");
}

</script>
</body>
</html>
